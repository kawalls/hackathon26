<div class="max-w-6xl mx-auto p-6 bg-white rounded-xl shadow-lg -mt-16 relative z-10">

    <button class="pb-2 text-gray-500">Flights</button>
    <button class="pb-2 text-gray-500">Cars</button>
  </div>

    <div class="border rounded p-3">

      <input type="text" placeholder="Mar 12 - Mar 15" class="w-full outline-none">

    <div class="border rounded p-3">

      <input type="text" placeholder="2 travelers, 1 room" class="w-full outline-none">
    </div>
    <button class="bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700">
